<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="main.css">
  <script src="main.js" defer></script>
  <title>Industrial Monitor</title>
</head>
<body>

  <header>
    <h1>Industrial Monitor</h1>
    <div id="connection-status">
      <span class="dot"></span>
      <span id="status-text">Disconnected</span>
    </div>
  </header>

  <div class="controls">
    <label for="ws-url">WebSocket URL</label>
    <input id="ws-url" type="text" value="ws://localhost:8765" />
    <button id="connect-btn" onclick="toggleConnection()">Connect</button>
  </div>

  <div class="controls auth-controls">
    <label for="ws-username">Username</label>
    <input id="ws-username" type="text" value="admin" />
    <label for="ws-password">Password</label>
    <input id="ws-password" type="password" value="admin" />
    <button id="auth-btn" onclick="authenticateClient()">Authenticate</button>
    <span id="auth-status" class="auth-status">Not authenticated</span>
  </div>

  <div id="data-container"></div>

  <section class="log-section">
    <h2>Event Log</h2>
    <div id="log"></div>
  </section>

</body>
</html>
